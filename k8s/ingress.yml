apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: cleanreport-ingress
  namespace: cleanreport
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - cleanreport.yourdomain.com # Replace with your domain
      secretName: cleanreport-tls
  rules:
    - host: cleanreport.yourdomain.com # Replace with your domain
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: cleanreport-backend
                port:
                  number: 3000
---
apiVersion: v1
kind: Service
metadata:
  name: cleanreport-backend-lb
  namespace: cleanreport
spec:
  selector:
    app: cleanreport-backend
  ports:
    - port: 80
      targetPort: 3000
  type: LoadBalancer
