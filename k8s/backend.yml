apiVersion: apps/v1
kind: Deployment
metadata:
  name: cleanreport-backend
  namespace: cleanreport
spec:
  replicas: 2
  selector:
    matchLabels:
      app: cleanreport-backend
  template:
    metadata:
      labels:
        app: cleanreport-backend
    spec:
      containers:
        - name: cleanreport-backend
          image: ghcr.io/ginapuspitaa/cleanreport:latest
          ports:
            - containerPort: 3000
          env:
            - name: NODE_ENV
              valueFrom:
                configMapKeyRef:
                  name: cleanreport-config
                  key: NODE_ENV
            - name: PORT
              valueFrom:
                configMapKeyRef:
                  name: cleanreport-config
                  key: PORT
            - name: DB_DIALECT
              valueFrom:
                configMapKeyRef:
                  name: cleanreport-config
                  key: DB_DIALECT
            - name: DB_HOST
              valueFrom:
                configMapKeyRef:
                  name: cleanreport-config
                  key: DB_HOST
            - name: DB_PORT
              valueFrom:
                configMapKeyRef:
                  name: cleanreport-config
                  key: DB_PORT
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: cleanreport-secrets
                  key: DB_USER
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: cleanreport-secrets
                  key: DB_PASSWORD
            - name: DB_NAME
              valueFrom:
                configMapKeyRef:
                  name: cleanreport-config
                  key: DB_NAME
            - name: AWS_REGION
              valueFrom:
                configMapKeyRef:
                  name: cleanreport-config
                  key: AWS_REGION
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: cleanreport-secrets
                  key: AWS_ACCESS_KEY_ID
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: cleanreport-secrets
                  key: AWS_SECRET_ACCESS_KEY
            - name: AWS_S3_BUCKET
              valueFrom:
                secretKeyRef:
                  name: cleanreport-secrets
                  key: AWS_S3_BUCKET
            - name: AWS_S3_REGION
              valueFrom:
                configMapKeyRef:
                  name: cleanreport-config
                  key: AWS_S3_REGION
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "200m"
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: cleanreport-backend
  namespace: cleanreport
spec:
  selector:
    app: cleanreport-backend
  ports:
    - port: 3000
      targetPort: 3000
  type: ClusterIP
