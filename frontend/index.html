<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CleanReport - Sistem Pelaporan Sampah</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <nav class="navbar">
      <div class="container">
        <div class="navbar-brand">
          <h1>🗑️ CleanReport</h1>
          <p class="subtitle">Sistem Pelaporan Sampah Berbasis Masyarakat</p>
        </div>
        <ul class="nav-menu">
          <li>
            <a href="#" onclick="showSection('reports-section')"
              >Daftar Laporan</a
            >
          </li>
          <li>
            <a href="#" onclick="showSection('create-section')">Buat Laporan</a>
          </li>
        </ul>
      </div>
    </nav>

    <div class="container main-content">
      <!-- Create Report Section -->
      <section id="create-section" class="section">
        <h2>Buat Laporan Sampah Baru</h2>
        <form id="reportForm" class="form-create">
          <div class="form-group">
            <label for="title">Judul Laporan</label>
            <input
              type="text"
              id="title"
              name="title"
              placeholder="Contoh: Tumpukan Sampah di Taman"
              required
            />
          </div>

          <div class="form-group">
            <label for="description">Deskripsi</label>
            <textarea
              id="description"
              name="description"
              placeholder="Jelaskan kondisi sampah secara detail..."
              rows="5"
              required
            ></textarea>
          </div>

          <div class="form-row">
            <div class="form-group">
              <label for="location">Lokasi</label>
              <input
                type="text"
                id="location"
                name="location"
                placeholder="Contoh: Jalan Sudirman No. 123, Jakarta"
                required
              />
            </div>
          </div>

          <div class="form-row">
            <div class="form-group">
              <label for="latitude">Latitude (Opsional)</label>
              <input
                type="number"
                id="latitude"
                name="latitude"
                step="0.000001"
                placeholder="-6.2088"
              />
            </div>
            <div class="form-group">
              <label for="longitude">Longitude (Opsional)</label>
              <input
                type="number"
                id="longitude"
                name="longitude"
                step="0.000001"
                placeholder="106.8456"
              />
            </div>
          </div>

          <div class="form-group">
            <label for="image">Upload Gambar</label>
            <input type="file" id="image" name="image" accept="image/*" />
            <small>Format: JPG, PNG, GIF, WebP | Max: 5MB</small>
          </div>

          <button type="submit" class="btn btn-primary">Kirim Laporan</button>
          <div id="submitMessage"></div>
        </form>
      </section>

      <!-- Reports List Section -->
      <section id="reports-section" class="section" style="display: none">
        <h2>Daftar Laporan Sampah</h2>

        <div class="filters">
          <button class="filter-btn active" onclick="filterReports('all')">
            Semua
          </button>
          <button class="filter-btn" onclick="filterReports('pending')">
            Pending
          </button>
          <button class="filter-btn" onclick="filterReports('diproses')">
            Diproses
          </button>
          <button class="filter-btn" onclick="filterReports('selesai')">
            Selesai
          </button>
        </div>

        <div id="reportsList" class="reports-grid">
          <p class="loading">Memuat data...</p>
        </div>
      </section>
    </div>

    <!-- Modal for Report Details -->
    <div id="reportModal" class="modal">
      <div class="modal-content">
        <span class="close" onclick="closeModal()">&times;</span>
        <div id="reportDetail"></div>
      </div>
    </div>

    <footer class="footer">
      <p>&copy; 2024 CleanReport - Platform Pelaporan Sampah Masyarakat</p>
    </footer>

    <script src="js/app.js"></script>
  </body>
</html>
