name: Deploy to Production

on:
  workflow_run:
    workflows: ["CI/CD Pipeline"]
    types:
      - completed

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: |
          cd backend
          npm ci --only=production

      - name: Run tests
        run: |
          cd backend
          npm test

      - name: Build application
        run: |
          echo "Building application..."
          # Add build steps if needed

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:latest
            ghcr.io/${{ github.repository }}:${{ github.sha }}

      - name: Deploy to server
        run: |
          echo "🚀 Starting deployment process..."

          # Option 1: Deploy using SSH (uncomment and configure)
          # echo "${{ secrets.SERVER_SSH_KEY }}" > private_key && chmod 600 private_key
          # ssh -o StrictHostKeyChecking=no -i private_key ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} << 'EOF'
          #   cd /path/to/your/app
          #   docker pull ghcr.io/${{ github.repository }}:latest
          #   docker-compose down
          #   docker-compose up -d
          #   docker system prune -f
          # EOF

          # Option 2: Deploy to AWS EC2 (uncomment and configure)
          # aws ec2 describe-instances --instance-ids ${{ secrets.AWS_INSTANCE_ID }}
          # Add your AWS deployment commands here

          # Option 3: Deploy using webhook
          # curl -X POST ${{ secrets.DEPLOY_WEBHOOK_URL }} \
          #   -H "Content-Type: application/json" \
          #   -d '{"image": "ghcr.io/${{ github.repository }}:latest"}'

          echo "✅ Deployment commands prepared"
          echo "📝 Configure your deployment method in the workflow"

      - name: Health check
        run: |
          echo "🔍 Performing health checks..."
          # Add health check commands
          echo "✅ Health checks completed"

      - name: Notification
        run: |
          echo "📢 Deployment completed successfully!"
          echo "🌐 Application should be available at your configured URL"
